<!DOCTYPE html>
<html lang "vi">	
	<head>
		<title>BẢNG CỬU CHƯƠNG</title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style5.css">
	</head>
<body>

<div class="box">
    <h2>BẢNG CỬU CHƯƠNG</h2>

    <input type="number" id="num" min="1" max="10" placeholder="Nhập số 1 - 10">

    <button onclick="inBCC()">IN</button>

    <div id="kq"></div>
</div>

<script>
    function inBCC(){
        let num = parseInt(document.getElementById("num").value);
        let kq = "";

        if(isNaN(num) || num < 1 || num > 10){
            document.getElementById("kq").innerHTML = "Vui lòng nhập số từ 1 đến 10!";
            return;
        }

        for(let i = 1; i <= 10; i++){
            kq += `${num} x ${i} = ${num * i} <br>`;
        }

        document.getElementById("kq").innerHTML = kq;
    }
</script>

</body>
</html>
