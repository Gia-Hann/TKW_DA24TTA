    <script>
        //1.Lấy URLSearchParams từ URL
        const URLParams = new URLSearchParams(window.location.search);
        const productID = URLParams.get('id');

        //2.Tìm sản phẩm theo ID
        const product = productDatabase.find(p => p.id === Number(productID));
        if (product) {
        //3.Hiển thị dữ liệu lên giao diện
        document.getElementById('p-name').innerText = product.name;
        document.getElementById('p-price').innerText = "Gía bán" (product.price).toLocaleString() + "/túi"
        document.getElementById('p-imgae').src = product.img;
        document.getElementById('p-image').alt = product.name;
        document.getElementById('product-description').innerText = product.desc;
        }
        </script>
