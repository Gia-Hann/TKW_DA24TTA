<!DOCTYPE html>
<html lang "vi">	
	<head>
		<title>	Thiết kế form đăng nhập</title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style2.css">
	</head>

	<body>
		<div class = "container ">
            <form id = "frmLogin">
                <h3 id = "title">Đăng nhập hệ thống</h3>
                <div class = "form-group">
                    <lable for = "txtUsername">Tên đăng nhập: </lable>
                    <input class = "form-control" type = "text" id = "txtUsername" name = "txtUsername">
                </div>
                <div class = "form-group">
                    <lable for = "txtPassword">Tên đăng nhập: </lable>
                    <input class = "form-control" type = "password" id = "txtPassword" name = "txtUsername">
                </div>
                <input class = "button" type = "submit" id = "sbLogin" name = "sbLogin" value= "Đăng nhập">
                <input class = "button" type = "reset" id = "rsCancel" name = "rsCancel" value= "Nhập lại">
            </form>
        </div>
	</body>
</html>
